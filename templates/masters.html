<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<title>Master Tables</title>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 w-100 text-center">Master Tables</span>

    <!-- ✅ Dynamic name + correct logout -->
    <span class="position-absolute end-0 me-3">
      {{ name }} | <a href="{% url 'logout' %}">Logout</a>
    </span>
  </div>
</nav>

<div class="container mt-4">

  <div class="d-flex justify-content-between mb-3">
    <h4>Master Table List</h4>
  </div>

  <table class="table table-bordered">
    <thead class="table-light">
      <tr>
        <th>Serial Number</th>
        <th>Master Table</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>

      <!-- STANDARD -->
      <tr>
        <td>1</td>
        <td>Standard</td>
        <td>
          <a href="/add-master/standard/" class="btn btn-success btn-sm me-2">Add</a>
          <a href="/view-master/standard/" class="btn btn-primary btn-sm">View</a>
        </td>
      </tr>

      <!-- SECTION -->
      <tr>
        <td>2</td>
        <td>Section</td>
        <td>
          <a href="/add-master/section/" class="btn btn-success btn-sm me-2">Add</a>
          <a href="/view-master/section/" class="btn btn-primary btn-sm">View</a>
        </td>
      </tr>

      <!-- SUBJECT -->
      <tr>
        <td>3</td>
        <td>Subject</td>
        <td>
          <a href="/add-master/subject/" class="btn btn-success btn-sm me-2">Add</a>
          <a href="/view-master/subject/" class="btn btn-primary btn-sm">View</a>
        </td>
      </tr>

    </tbody>
  </table>

  <!-- Correct back route -->
  <a href="/admin-dashboard/" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
