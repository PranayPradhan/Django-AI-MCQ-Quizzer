<!doctype html>
<html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 w-100 text-center">Add / Edit Student</span>
    <span class="position-absolute end-0 me-3">Admin User | <a href="{% url 'logout' %}">Logout</a></span>
  </div>
</nav>


<div class="container mt-4">

<form method="POST">
  {% csrf_token %}
<div class="mb-3">
<label>Name</label>
<input name="name" class="form-control" value="{{ student.name|default:'' }}" required>
</div>

<div class="mb-3">
<label>User ID</label>
<input name="user_id" class="form-control" value="{{ student.user_id|default:'' }}" required>
</div>

<div class="mb-3">
<label>Password</label>
<input name="password" class="form-control" value="{{ student.password|default:'' }}" required></div>

<!-- Standard -->
<div class="mb-3">
  <label>Standard</label>
  <select name="standard" class="form-select" required>
    <option value="" disabled selected>Select</option>
    {% for s in standards %}
      <option value="{{ s.name }}"
        {% if student.standard == s.name %}selected{% endif %}>
        {{ s.name }}
      </option>
    {% endfor %}
  </select>
</div>

<!-- Section -->
<div class="mb-3">
  <label>Section</label>
  <select name="section" class="form-select" required>
    <option value="" disabled selected>Select</option>
    {% for s in sections %}
      <option value="{{ s.name }}"
        {% if student.section == s.name %}selected{% endif %}>
        {{ s.name }}
      </option>
    {% endfor %}
  </select>
</div>


<a href="/students/" class="btn btn-secondary">Cancel</a>
<button type="submit" class="btn btn-primary">Submit</button>
</form>
</div>
</body>
</html>
