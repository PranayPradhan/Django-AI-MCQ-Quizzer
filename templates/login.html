<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Quizzer - Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="text-center mb-4">AI Assisted MCQ Quizzer</h3>
            {% if error %}
            <div class="alert alert-danger">
              {{ error }}
            </div>
            {% endif %}
            <form method="POST">
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label">User ID</label>
                <input type="text" name="user_id" class="form-control" placeholder="Enter user id" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
              </div>

            </form>
          <!-- <div class="d-grid gap-2">
            <a href="admin_dashboard.html" class="btn btn-primary">Login as Admin</a>
            <a href="teacher_dashboard.html" class="btn btn-success">Login as Teacher</a>
            <a href="student_dashboard.html" class="btn btn-warning">Login as Student</a>
          </div> -->
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
