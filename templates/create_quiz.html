<!doctype html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 w-100 text-center">Create Quiz</span>
    <span class="position-absolute end-0 me-3">
      {{ name }} | <a href="{% url 'logout' %}">Logout</a>
    </span>
  </div>
</nav>

<div class="container mt-4">

<form method="POST">
  {% csrf_token %}

  <!-- Title -->
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input name="title" type="text" class="form-control" required>
  </div>

  <!-- Standard -->
  <div class="mb-3">
    <label class="form-label">Standard</label>
    <select name="standard" class="form-select">
      {% for s in standards %}
      <option value="{{ s.name }}">{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- ✅ FIXED: Section -->
  <div class="mb-3">
    <label class="form-label">Section</label>
    <select name="section" class="form-select">
      {% for s in sections %}
      <option value="{{ s.name }}">{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- ✅ FIXED: Subject -->
  <div class="mb-3">
    <label class="form-label">Subject</label>
    <select name="subject" class="form-select">
      {% for s in subjects %}
      <option value="{{ s.name }}">{{ s.name }}</option>
      {% endfor %}
    </select>
  </div>

  <!-- Number of Questions -->
  <div class="mb-3">
    <label class="form-label">Number of Questions</label>
    <input name="num_questions" type="number" class="form-control" required>
  </div>

  <!-- Content Type -->
  <div class="mb-3">
    <label class="form-label">Content Type</label>
    <select name="content_type" class="form-select">
      <option value="Topic Description">Topic Description</option>
      <option value="Lesson Content">Lesson Content</option>
    </select>
  </div>

  <!-- Topic / Content -->
  <div class="mb-3">
    <label class="form-label">Topic / Content</label>
    <textarea name="topic_content" class="form-control"></textarea>
  </div>

  <!-- Buttons -->
  <div class="d-flex gap-2">
    <a href="/teacher-dashboard/" class="btn btn-secondary">Cancel</a>
    <button type="submit" class="btn btn-primary">Create Quiz</button>
  </div>

</form>
  
</div>

</body>
</html>
