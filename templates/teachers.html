<!doctype html>
<html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  
  <nav class="navbar navbar-light bg-light border-bottom">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1 w-100 text-center">Teachers</span>
      <span class="position-absolute end-0 me-3">Admin User | <a href="{% url 'logout' %}">Logout</a></span>
    </div>
  </nav>
  
  <div class="container mt-4">
    
    <div class="d-flex justify-content-between mb-3">
      <h4>Teacher List</h4>
      <a href="/add-teacher/" class="btn btn-success">Add New Teacher</a>
    </div>
    
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>User ID</th><th>Password</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
{% for teacher in teachers %}
<tr>
  <td>{{ teacher.id }}</td>
  <td>{{ teacher.name }}</td>
  <td>{{ teacher.user_id }}</td>
  <td>{{ teacher.password }}</td>
  <td>
    <a href="/edit-teacher/{{ teacher.id }}/" class="btn btn-primary btn-sm me-2">Edit</a>
    <button class="btn btn-danger btn-sm"
          data-bs-toggle="modal"
          data-bs-target="#confirmDelete"
          onclick="setDeleteId('{{ teacher.id }}')">
      Delete
  </button>
  </td>
</tr>
{% endfor %}
</tbody>
</table>

<a href="/admin-dashboard/" class="btn btn-secondary">Back</a>

<div class="modal fade" id="confirmDelete">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Confirm</h5></div>
      <div class="modal-body">Are you sure?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">No</button>
        <a id="deleteBtn" class="btn btn-danger">Yes</a>
      </div>
    </div>
  </div>
</div>

</div>
</body>
</html>

<script>
  function setDeleteId(id) {
    document.getElementById("deleteBtn").href = "/delete-teacher/" + id + "/";
  }
</script>
