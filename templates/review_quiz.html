<!doctype html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 w-100 text-center">Review & Publish</span>
    <span class="position-absolute end-0 me-3">
      {{ name }} | <a href="/logout/">Logout</a>
    </span>
  </div>
</nav>

<form method="POST">
{% csrf_token %}

<div class="container mt-4">

<h4 class="mb-4">{{ quiz.title }}</h4>

{% for q in questions %}

<div class="card mb-3 p-3">

  <!-- Question -->
  <label><b>Q{{ forloop.counter }}</b></label>
  <input type="text"
         name="question_{{ q.id }}"
         class="form-control mb-3"
         value="{{ q.question }}"
         required>

  <!-- Options -->
  <div class="mb-2">
    <label>Options</label>

    <div class="input-group mb-2">
      <span class="input-group-text">1</span>
      <input type="text" name="option1_{{ q.id }}" class="form-control" value="{{ q.option_1 }}" required>
    </div>

    <div class="input-group mb-2">
      <span class="input-group-text">2</span>
      <input type="text" name="option2_{{ q.id }}" class="form-control" value="{{ q.option_2 }}" required>
    </div>

    <div class="input-group mb-2">
      <span class="input-group-text">3</span>
      <input type="text" name="option3_{{ q.id }}" class="form-control" value="{{ q.option_3 }}" required>
    </div>

    <div class="input-group mb-2">
      <span class="input-group-text">4</span>
      <input type="text" name="option4_{{ q.id }}" class="form-control" value="{{ q.option_4 }}" required>
    </div>

  </div>

  <!-- Correct Option -->
  <label>Select Correct Option</label>
  <select name="correct_{{ q.id }}" class="form-select">
    <option value="0" {% if q.correct_option == 0 %}selected{% endif %}>1</option>
    <option value="1" {% if q.correct_option == 1 %}selected{% endif %}>2</option>
    <option value="2" {% if q.correct_option == 2 %}selected{% endif %}>3</option>
    <option value="3" {% if q.correct_option == 3 %}selected{% endif %}>4</option>
  </select>

</div>

{% endfor %}

<div class="mt-3">
  <button type="submit" class="btn btn-success">Publish Quiz</button>
  <a href="/list-quiz/" class="btn btn-secondary">Cancel</a>
</div>

</div>

</form>

</body>
</html>
