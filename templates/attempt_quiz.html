<!doctype html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h3>Attempt Quiz</h3>

<form method="POST">
{% csrf_token %}

{% for q in questions %}

<div class="card mb-3 p-3">

<p><b>Q{{ forloop.counter }}. {{ q.question }}</b></p>

<div class="form-check">
  <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="0">
  <label class="form-check-label">{{ q.option_1 }}</label>
</div>

<div class="form-check">
  <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="1">
  <label class="form-check-label">{{ q.option_2 }}</label>
</div>

<div class="form-check">
  <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="2">
  <label class="form-check-label">{{ q.option_3 }}</label>
</div>

<div class="form-check">
  <input class="form-check-input" type="radio" name="question_{{ q.id }}" value="3">
  <label class="form-check-label">{{ q.option_4 }}</label>
</div>

</div>

{% endfor %}

<button type="submit" class="btn btn-success">Submit Quiz</button>

</form>

</div>

</body>
</html>
