<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 w-100 text-center">Add {{ type|title }}</span>
    <span class="position-absolute end-0 me-3">
      {{ name }} | <a href="{% url 'logout' %}">Logout</a>
    </span>
  </div>
</nav>

<div class="container mt-4">

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">{{ type|title }} Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>

    <button class="btn btn-success">Save</button>
    <a href="/master-tables/" class="btn btn-secondary">Back</a>

  </form>

</div>

</body>
</html>
