<!doctype html>
<html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  
  <nav class="navbar navbar-light bg-light border-bottom">
    <div class="container-fluid">
      <h3>{% if teacher %}Edit{% else %}Add{% endif %} Teacher</h3>
      <span class="position-absolute end-0 me-3">Admin User | <a href="{% url 'logout' %}">Logout</a></span>
    </div>
  </nav>
  
  <div class="container mt-4">
    
    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label>Name</label>
        <input name="name" class="form-control" value="{{ teacher.name|default:'' }}">
      </div>
      
      <div class="mb-3">
        <label>User ID</label>
        <input name="user_id" class="form-control" value="{{ teacher.user_id|default:'' }}">
      </div>
      
      <div class="mb-3">
        <label>Password</label>
        <input name="password" class="form-control" value="{{ teacher.password|default:'' }}">
      </div>
      
      <a href="/teachers/" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Submit</button>
      
    </form>
    
  </div>
</body>

</html>
