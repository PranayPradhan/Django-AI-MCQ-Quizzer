<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

<nav class="navbar navbar-light bg-light border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1 w-100 text-center">Teacher Dashboard</span>
    <span class="position-absolute end-0 me-3">{{ name }} | <a href="{% url 'logout' %}">Logout</a></span>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">

    <div class="col-md-4">
      <a href="/create-quiz/" class="btn btn-outline-primary w-100 mb-3">
        Create New Quiz
      </a>
    </div>

    <div class="col-md-4">
      <a href="/list-quiz/" class="btn btn-outline-success w-100 mb-3">
        List Quiz
      </a>
    </div>

    <div class="col-md-4">
      <a href="/assign-quiz/" class="btn btn-outline-secondary w-100 mb-3">
        Assign Quiz
      </a>
    </div>

  </div>
</div>

</body>
</html>
